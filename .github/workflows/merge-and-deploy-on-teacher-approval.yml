name: Merge and deploy on teacher approval

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-and-deploy:
    if: |
      github.event.review.state == 'approved' &&
      vars.TEACHER_GITHUB_LOGIN != '' &&
      github.event.review.user.login == vars.TEACHER_GITHUB_LOGIN
    runs-on: ubuntu-latest

    steps:
      - name: Enable auto-merge (squash)
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;

            await github.graphql(
              `mutation($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: {
                  pullRequestId: $pullRequestId,
                  mergeMethod: SQUASH
                }) {
                  pullRequest { number }
                }
              }`,
              {
                pullRequestId: context.payload.pull_request.node_id,
              },
            );

            core.info(`Enabled auto-merge for PR #${pull_number}.`);

      - name: Trigger deploy hook
        if: secrets.DEPLOY_WEBHOOK_URL != ''
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            --header 'Content-Type: application/json' \
            --data "{\"pull_request\":${PR_NUMBER},\"approved_by\":\"${{ github.event.review.user.login }}\"}" \
            "$DEPLOY_WEBHOOK_URL"
