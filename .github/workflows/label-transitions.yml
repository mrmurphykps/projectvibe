name: Auto label transitions

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  issues: write

jobs:
  pending-teacher-to-in-progress:
    if: github.event_name == 'issues' && github.event.label.name == 'pending-teacher'
    runs-on: ubuntu-latest
    steps:
      - name: Move pending-teacher to in-progress
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue.number;

            await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'pending-teacher' });
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['in-progress'] });

  in-progress-to-ready-to-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to ready-to-review
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const body = context.payload.pull_request.body || '';
            const issueMatches = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)];
            const issueNumbers = [...new Set(issueMatches.map((m) => Number(m[1])))];

            for (const issue_number of issueNumbers) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name: 'in-progress' });
              } catch (error) {
                if (error.status !== 404) throw error;
              }

              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: ['ready-to-review'] });
              core.info(`Issue #${issue_number} moved to ready-to-review via PR #${prNumber}`);
            }
