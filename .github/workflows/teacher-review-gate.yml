name: Teacher review gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: read
  pull-requests: read

jobs:
  require-teacher-approval:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure teacher approved this PR
        uses: actions/github-script@v7
        env:
          TEACHER_GITHUB_USERS: ${{ vars.TEACHER_GITHUB_USERS }}
        with:
          script: |
            const allowed = (process.env.TEACHER_GITHUB_USERS || '')
              .split(',')
              .map((v) => v.trim().toLowerCase())
              .filter(Boolean);

            if (!allowed.length) {
              core.setFailed('Repository variable TEACHER_GITHUB_USERS is not set. Configure it as comma-separated GitHub usernames.');
              return;
            }

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;
            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner,
              repo,
              pull_number: prNumber,
              per_page: 100,
            });

            const latestByUser = new Map();
            for (const review of reviews) {
              latestByUser.set(review.user.login.toLowerCase(), review.state);
            }

            const approved = allowed.some((user) => latestByUser.get(user) === 'APPROVED');
            if (!approved) {
              core.setFailed(`Waiting for teacher approval from one of: ${allowed.join(', ')}`);
            }
