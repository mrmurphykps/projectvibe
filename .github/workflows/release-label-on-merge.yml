name: Label issue released on merge

on:
  pull_request:
    types: [closed]

permissions:
  issues: write
  pull-requests: read

jobs:
  label-released:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Apply released label to linked issues
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const issueNumbers = [...body.matchAll(/(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi)]
              .map((m) => Number(m[1]));

            const uniqueIssues = [...new Set(issueNumbers)].filter(Boolean);
            const { owner, repo } = context.repo;

            for (const issue_number of uniqueIssues) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: ['released'],
              });

              for (const name of ['pending-teacher', 'in-progress', 'ready-to-review']) {
                try {
                  await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
                } catch (error) {
                  if (error.status !== 404) throw error;
                }
              }
            }
