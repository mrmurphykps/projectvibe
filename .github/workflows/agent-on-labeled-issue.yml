name: Agent PR from labeled issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  generate-pr:
    if: github.event.label.name == 'ready-for-agent'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create working branch
        id: branch
        run: |
          BRANCH_NAME="agent/issue-${{ github.event.issue.number }}-${{ github.run_id }}"
          echo "name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          git checkout -b "$BRANCH_NAME"

      - name: Mark issue in progress
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['in-progress'],
            });

            const removable = ['pending-teacher', 'ready-to-review', 'released', 'ready-for-agent'];
            for (const name of removable) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }

      - name: Run Codex agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          npm install -g @openai/codex
          codex run \
            --approval-mode full-auto \
            --sandbox danger-full-access \
            -- "Implement this GitHub issue:\n\nTitle: ${ISSUE_TITLE}\n\nBody:\n${ISSUE_BODY}\n\nMake the smallest safe change, update tests/docs, and leave the repo ready for PR review."

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ${{ steps.branch.outputs.name }}
          base: ${{ github.event.repository.default_branch }}
          title: "[Agent] Resolve #${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
          body: |
            Closes #${{ github.event.issue.number }}

            This PR was generated automatically by Codex from the `ready-for-agent` issue label.
          labels: |
            pending-teacher

      - name: Mark issue ready to review
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['ready-to-review'],
            });

            for (const name of ['in-progress']) {
              try {
                await github.rest.issues.removeLabel({ owner, repo, issue_number, name });
              } catch (error) {
                if (error.status !== 404) throw error;
              }
            }
